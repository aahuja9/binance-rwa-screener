services:
  - type: web
    name: binance-rwa-screener
    runtime: static
    buildCommand: ""
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*.js
        name: Cache-Control
        value: public, max-age=300
      - path: /index.html
        name: Cache-Control
        value: no-cache
