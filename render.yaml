services:
  - type: web
    name: binance-rwa-screener
    runtime: node
    region: singapore
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: POLL_SECONDS
        value: "300"
      - key: CONCURRENCY
        value: "6"
